# Qamelo Connectivity — Connectivity, B2B, and Agent Management Service
quarkus.application.name=qamelo-connectivity-app
quarkus.http.port=9002

# CORS for console UI
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Accept,Authorization

# JWT / Security — validate against qamelo-iam JWKS
mp.jwt.verify.publickey.location=${QAMELO_IAM_JWKS_URL:http://localhost:9000/.well-known/jwks.json}
mp.jwt.verify.issuer=${QAMELO_JWT_ISSUER:http://localhost:9000}
smallrye.jwt.fetch-remote-keys=true

# Disable proactive authentication so our custom ContainerRequestFilters
# (MtlsAuthFilter, JwtAuthFilter) own the auth flow.
quarkus.http.auth.proactive=false

# IAM internal client — fetches auth context for authorization cache (mTLS)
quarkus.rest-client.iam-internal.url=${QAMELO_IAM_INTERNAL_URL:https://qamelo-iam.qamelo-system.svc.cluster.local:9000}
quarkus.rest-client.iam-internal.connect-timeout=2000
quarkus.rest-client.iam-internal.read-timeout=3000

# mTLS — internal service-to-service authentication
# TLS cert paths only apply in prod (test profile uses DevServices without TLS)
%prod.quarkus.http.ssl.client-auth=request
%prod.quarkus.tls.key-store.pem.0.cert=/etc/qamelo/tls/tls.crt
%prod.quarkus.tls.key-store.pem.0.key=/etc/qamelo/tls/tls.key
%prod.quarkus.tls.trust-store.pem.certs=/etc/qamelo/tls/ca.crt

# Authorization context cache TTLs
qamelo.auth.cache.user-ttl-seconds=60

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=qamelo
quarkus.datasource.password=${QAMELO_DB_PASSWORD:qamelo}

# Reactive datasource (Hibernate Reactive + PgPool)
# URLs only set for dev/prod; test profile uses DevServices which injects URLs automatically
%dev.quarkus.datasource.reactive.url=postgresql://${QAMELO_DB_HOST:localhost}:${QAMELO_DB_PORT:5432}/${QAMELO_DB_NAME:qamelo_connectivity}
%prod.quarkus.datasource.reactive.url=postgresql://${QAMELO_DB_HOST:localhost}:${QAMELO_DB_PORT:5432}/${QAMELO_DB_NAME:qamelo_connectivity}

# JDBC datasource (Flyway only)
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://${QAMELO_DB_HOST:localhost}:${QAMELO_DB_PORT:5432}/${QAMELO_DB_NAME:qamelo_connectivity}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${QAMELO_DB_HOST:localhost}:${QAMELO_DB_PORT:5432}/${QAMELO_DB_NAME:qamelo_connectivity}

# Hibernate Reactive — schema managed by Flyway
quarkus.hibernate-orm.schema-management.strategy=none

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# Index dependencies for CDI + Hibernate entity discovery
quarkus.index-dependency.domain.group-id=io.qamelo
quarkus.index-dependency.domain.artifact-id=qamelo-connectivity-domain
quarkus.index-dependency.infra.group-id=io.qamelo
quarkus.index-dependency.infra.artifact-id=qamelo-connectivity-infra

# Logging
quarkus.log.console.json.enabled=true
quarkus.log.level=INFO
quarkus.log.category."io.qamelo".level=INFO
quarkus.log.category."io.qamelo.connectivity.audit".level=INFO

# Dev profile
%dev.quarkus.datasource.devservices.enabled=false
%dev.quarkus.log.console.json.enabled=false
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
%dev.quarkus.log.category."io.qamelo".level=DEBUG

# Test profile
%test.quarkus.log.console.json.enabled=false
%test.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
%test.quarkus.log.level=INFO
%test.quarkus.log.category."io.qamelo".level=DEBUG
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.image-name=postgres:16-alpine
# DevServices overrides JDBC + reactive URLs at test time automatically
