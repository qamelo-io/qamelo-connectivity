apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: qamelo-system
  labels:
    app.kubernetes.io/name: qamelo-connectivity
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: qamelo-connectivity
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qamelo-connectivity
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: qamelo-connectivity
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 9002
              name: http
              protocol: TCP
          env:
            - name: QAMELO_DB_HOST
              value: {{ .Values.postgresql.host }}
            - name: QAMELO_DB_PORT
              value: "{{ .Values.postgresql.port }}"
            - name: QAMELO_DB_NAME
              value: {{ .Values.postgresql.database }}
            - name: QAMELO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-db
                  key: password
            - name: QAMELO_IAM_INTERNAL_URL
              value: {{ .Values.iam.internalUrl }}
            - name: QAMELO_IAM_JWKS_URL
              value: {{ .Values.iam.jwksUrl }}
            - name: QAMELO_JWT_ISSUER
              value: {{ .Values.iam.jwtIssuer }}
            - name: QAMELO_SECRETS_URL
              value: {{ .Values.secrets.url }}
            - name: QAMELO_GATEWAY_URL
              value: {{ .Values.gateway.url }}
            - name: QAMELO_RUNTIME_NAMESPACE
              value: {{ .Values.k8s.runtimeNamespace }}
            - name: QAMELO_GATEWAY_IP
              value: {{ .Values.k8s.gatewayIp | quote }}
          volumeMounts:
            - name: tls
              mountPath: /etc/qamelo/tls
              readOnly: true
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tls
          secret:
            secretName: {{ .Release.Name }}-tls
