apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: qamelo-connectivity-vhost-manager
  labels:
    app.kubernetes.io/name: qamelo-connectivity
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]  # needed to discover gateway pod IPs for endpoints
